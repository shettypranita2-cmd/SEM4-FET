<html>
<head>
<title>Assignment 5 - Language Checker</title>

<style>
body {
  background-color: powderblue;
  font-family: Arial;
}

h1 {
  text-align: center;
  color: darkblue;
}

li {
  margin-bottom: 10px;
}

.container {
  margin: 20px;
  padding: 15px;
  border: 2px solid darkblue;
  background-color: white;
  border-radius: 10px;
}

input {
  padding: 8px;
  font-size: 16px;
  width: 250px;
}

button {
  padding: 8px 12px;
  margin-left: 10px;
  background-color: darkblue;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background-color: navy;
}

#output {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
  color: darkgreen;
}
</style>

<script>
function checkLanguage() {

  debugger; 

  let input = document.getElementById("userInput").value.toLowerCase().trim();

  let languages = ["java", "python", "c++", "c", "html"];

  let result = "";

  if (input === "") {
    result = "⚠ Please enter a programming language.";
  }
  else if (languages.includes(input)) {
    result = "💻 " + input.toUpperCase() + " is a VALID programming language.";
  }
  else {
    result = "❌ " + input + " is NOT in the list of valid programming languages.";
  }

  document.getElementById("output").innerText = result;
}
</script>

</head>

<body>

<h1>Assignment 5</h1>

<ol>
  <li>Programming Languages
    <ol>
      <li>Java</li>
      <li>Python</li>
      <li>C++</li>
      <li>C</li>
      <li>HTML</li>
    </ol>
  </li>
</ol>

<div class="container">

  <h2>Language Checker</h2>

  <p>Enter a programming language to check if it is valid:</p>

  <input type="text" id="userInput" placeholder="e.g. Python">

  <button onclick="checkLanguage()">Check</button>

  <p id="output"></p>

</div>

</body>
</html>
