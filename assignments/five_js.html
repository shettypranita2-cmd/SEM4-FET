<!DOCTYPE html>
<html>
<head>
<title>Student Form</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(to right, #cfd9df, #e2ebf0);
  text-align: center;
}

.box{
  width: 400px;
  margin: 50px auto;
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px gray;
  text-align: left;
}

input, select{
  width: 100%;
  padding: 6px;
  margin: 5px 0;
}

button{
  width: 48%;
  padding: 8px;
  border: none;
  color: white;
  cursor: pointer;
}

button[type="submit"]{
  background: green;
}

button[type="reset"]{
  background: red;
}

#out{
  margin-top: 15px;
  font-weight: bold;
}
</style>

<script>
function showData(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let dob = document.getElementById("dob").value;
  let course = document.getElementById("course").value;

  let deptBox = document.getElementById("dept");
  let dept = [];

  for (let i = 0; i < deptBox.selectedOptions.length; i++) {
    dept.push(deptBox.selectedOptions[i].value);
  }

  document.getElementById("out").innerHTML =
    "Name: " + name + "<br>" +
    "Email: " + email + "<br>" +
    "DOB: " + dob + "<br>" +
    "Course: " + course + "<br>" +
    "Department: " + dept.join(", ");
}
</script>

</head>

<body>

<div class="box">

<h3>Student Form</h3>

<form onsubmit="showData(event)">

<fieldset>
<legend>Personal Details</legend>

Name:<br>
<input id="name">

Email:<br>
<input id="email">

DOB:<br>
<input type="date" id="dob">

</fieldset>

<br>

<fieldset>
<legend>Academic Details</legend>

Course:<br>
<select id="course">
  <option>B.Tech</option>
  <option>MCA</option>
  <option>MBA</option>
</select>

Department:<br>
<select id="dept" multiple size="3">
  <option>CSE</option>
  <option>ECE</option>
  <option>MECH</option>
</select>

</fieldset>

<br>

<button type="submit">Submit</button>
<button type="reset">Reset</button>

</form>

<div id="out"></div>

</div>

</body>
</html>
